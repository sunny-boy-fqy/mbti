<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 人格测试</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 开始页面 -->
        <div id="start-page" class="page active">
            <div class="start-content">
                <div class="logo">
                    <span class="logo-icon">🧠</span>
                    <h1>MBTI 人格测试</h1>
                </div>
                <p class="subtitle">探索你的性格类型，了解真实的自己</p>
                <div class="info-cards">
                    <div class="info-card">
                        <span class="card-icon">⏱️</span>
                        <span>约 5 分钟</span>
                    </div>
                    <div class="info-card">
                        <span class="card-icon">📝</span>
                        <span>60 道题目</span>
                    </div>
                    <div class="info-card">
                        <span class="card-icon">🎯</span>
                        <span>16 种人格</span>
                    </div>
                </div>
                <button id="start-btn" class="primary-btn">开始测试</button>
                <p class="disclaimer">本测试基于 MBTI 理论，仅供参考</p>
            </div>
        </div>

        <!-- 测试页面 -->
        <div id="test-page" class="page">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-text">
                <span id="question-number">1</span> / <span id="total-questions">60</span>
            </div>

            <div class="question-container">
                <h2 id="question-text"></h2>
                <div class="options-container">
                    <button class="option-btn" data-value="1">
                        <span class="option-label">非常不同意</span>
                    </button>
                    <button class="option-btn" data-value="2">
                        <span class="option-label">不同意</span>
                    </button>
                    <button class="option-btn" data-value="3">
                        <span class="option-label">中立</span>
                    </button>
                    <button class="option-btn" data-value="4">
                        <span class="option-label">同意</span>
                    </button>
                    <button class="option-btn" data-value="5">
                        <span class="option-label">非常同意</span>
                    </button>
                </div>
            </div>

            <div class="nav-buttons">
                <button id="prev-btn" class="secondary-btn" disabled>上一题</button>
            </div>
        </div>

        <!-- 结果页面 -->
        <div id="result-page" class="page">
            <div class="result-content">
                <div class="result-header">
                    <h1>测试完成！</h1>
                    <p>你的人格类型是</p>
                </div>

                <div class="type-badge" id="type-badge">
                    <span class="type-code"></span>
                </div>

                <div class="type-name" id="type-name"></div>

                <div class="dimension-bars">
                    <div class="dimension">
                        <div class="dimension-labels">
                            <span class="label-left">外向 (E)</span>
                            <span class="label-right">内向 (I)</span>
                        </div>
                        <div class="dimension-bar">
                            <div class="bar-fill e-bar" id="e-bar"></div>
                            <div class="bar-fill i-bar" id="i-bar"></div>
                        </div>
                        <div class="dimension-percent">
                            <span id="e-percent">50%</span>
                            <span id="i-percent">50%</span>
                        </div>
                    </div>

                    <div class="dimension">
                        <div class="dimension-labels">
                            <span class="label-left">实感 (S)</span>
                            <span class="label-right">直觉 (N)</span>
                        </div>
                        <div class="dimension-bar">
                            <div class="bar-fill s-bar" id="s-bar"></div>
                            <div class="bar-fill n-bar" id="n-bar"></div>
                        </div>
                        <div class="dimension-percent">
                            <span id="s-percent">50%</span>
                            <span id="n-percent">50%</span>
                        </div>
                    </div>

                    <div class="dimension">
                        <div class="dimension-labels">
                            <span class="label-left">思考 (T)</span>
                            <span class="label-right">情感 (F)</span>
                        </div>
                        <div class="dimension-bar">
                            <div class="bar-fill t-bar" id="t-bar"></div>
                            <div class="bar-fill f-bar" id="f-bar"></div>
                        </div>
                        <div class="dimension-percent">
                            <span id="t-percent">50%</span>
                            <span id="f-percent">50%</span>
                        </div>
                    </div>

                    <div class="dimension">
                        <div class="dimension-labels">
                            <span class="label-left">判断 (J)</span>
                            <span class="label-right">感知 (P)</span>
                        </div>
                        <div class="dimension-bar">
                            <div class="bar-fill j-bar" id="j-bar"></div>
                            <div class="bar-fill p-bar" id="p-bar"></div>
                        </div>
                        <div class="dimension-percent">
                            <span id="j-percent">50%</span>
                            <span id="p-percent">50%</span>
                        </div>
                    </div>
                </div>

                <div class="type-description" id="type-description"></div>

                <div class="result-actions">
                    <button id="share-btn" class="secondary-btn">分享结果</button>
                    <button id="restart-btn" class="primary-btn">重新测试</button>
                </div>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
