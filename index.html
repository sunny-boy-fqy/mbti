<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 人格测试</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="toolbar">
        <label for="lang-select" class="lang-label" id="lang-label">语言</label>
        <select id="lang-select" class="lang-select">
            <option value="zh">中文</option>
            <option value="en">English</option>
        </select>
    </div>

    <div class="container">
        <!-- 开始页面 -->
        <div id="start-page" class="page active">
            <div class="start-content">
                <div class="logo">
                    <span class="logo-icon">🧠</span>
                    <h1 id="app-title">MBTI 人格测试</h1>
                </div>
                <p class="subtitle" id="app-subtitle">探索你的性格类型，了解真实的自己</p>
                <div class="info-cards">
                    <div class="info-card">
                        <span class="card-icon">⏱️</span>
                        <span id="card-time-text">约 8 分钟</span>
                    </div>
                    <div class="info-card">
                        <span class="card-icon">📝</span>
                        <span id="card-questions-text">104 道题目</span>
                    </div>
                    <div class="info-card">
                        <span class="card-icon">🎯</span>
                        <span id="card-types-text">16 种人格</span>
                    </div>
                </div>
                <button id="start-btn" class="primary-btn">开始测试</button>
                <button id="view-questions-btn" class="secondary-btn" style="margin-top: 10px;">查看题库</button>
                <p class="disclaimer" id="app-disclaimer">本测试基于 MBTI 理论，仅供参考</p>
            </div>
        </div>

        <!-- 测试页面 -->
        <div id="test-page" class="page">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-text">
                <span id="question-number">1</span> / <span id="total-questions">104</span>
            </div>

            <div class="question-container">
                <h2 id="question-text"></h2>
                <div class="options-container">
                    <button class="option-btn" data-value="A">
                        <span class="option-label">选项A</span>
                    </button>
                    <button class="option-btn" data-value="B">
                        <span class="option-label">选项B</span>
                    </button>
                </div>
            </div>

            <div class="nav-buttons">
                <button id="prev-btn" class="secondary-btn" disabled>上一题</button>
            </div>
        </div>

        <!-- 题库查看页面 -->
        <div id="questions-page" class="page">
            <div class="questions-content">
                <div class="questions-header">
                    <h1 id="questions-title">题库内容</h1>
                    <button id="close-questions-btn" class="secondary-btn">返回</button>
                </div>
                <div class="questions-filter">
                    <label><span id="filter-label-text">筛选维度：</span>
                        <select id="dimension-filter">
                            <option value="all" id="filter-option-all">全部</option>
                            <option value="EI" id="filter-option-ei">E-I (外向-内向)</option>
                            <option value="SN" id="filter-option-sn">S-N (实感-直觉)</option>
                            <option value="TF" id="filter-option-tf">T-F (思考-情感)</option>
                            <option value="JP" id="filter-option-jp">J-P (判断-感知)</option>
                        </select>
                    </label>
                </div>
                <div id="questions-list" class="questions-list"></div>
            </div>
        </div>

        <!-- 结果页面 -->
        <div id="result-page" class="page">
            <div class="result-content">
                <div class="result-header">
                    <h1 id="result-title">测试完成！</h1>
                    <p id="result-subtitle">你的人格类型是</p>
                </div>

                <div class="type-badge" id="type-badge">
                    <span class="type-code"></span>
                </div>

                <div class="type-name" id="type-name"></div>

                <div class="dimension-bars">
                    <div class="dimension">
                        <div class="dimension-labels">
                            <span class="label-left" id="label-e-left">外向 (E)</span>
                            <span class="label-right" id="label-e-right">内向 (I)</span>
                        </div>
                        <div class="dimension-bar">
                            <div class="bar-fill e-bar" id="e-bar"></div>
                            <div class="bar-fill i-bar" id="i-bar"></div>
                        </div>
                        <div class="dimension-percent">
                            <span id="e-percent">50%</span>
                            <span id="i-percent">50%</span>
                        </div>
                    </div>

                    <div class="dimension">
                        <div class="dimension-labels">
                            <span class="label-left" id="label-s-left">实感 (S)</span>
                            <span class="label-right" id="label-s-right">直觉 (N)</span>
                        </div>
                        <div class="dimension-bar">
                            <div class="bar-fill s-bar" id="s-bar"></div>
                            <div class="bar-fill n-bar" id="n-bar"></div>
                        </div>
                        <div class="dimension-percent">
                            <span id="s-percent">50%</span>
                            <span id="n-percent">50%</span>
                        </div>
                    </div>

                    <div class="dimension">
                        <div class="dimension-labels">
                            <span class="label-left" id="label-t-left">思考 (T)</span>
                            <span class="label-right" id="label-t-right">情感 (F)</span>
                        </div>
                        <div class="dimension-bar">
                            <div class="bar-fill t-bar" id="t-bar"></div>
                            <div class="bar-fill f-bar" id="f-bar"></div>
                        </div>
                        <div class="dimension-percent">
                            <span id="t-percent">50%</span>
                            <span id="f-percent">50%</span>
                        </div>
                    </div>

                    <div class="dimension">
                        <div class="dimension-labels">
                            <span class="label-left" id="label-j-left">判断 (J)</span>
                            <span class="label-right" id="label-j-right">感知 (P)</span>
                        </div>
                        <div class="dimension-bar">
                            <div class="bar-fill j-bar" id="j-bar"></div>
                            <div class="bar-fill p-bar" id="p-bar"></div>
                        </div>
                        <div class="dimension-percent">
                            <span id="j-percent">50%</span>
                            <span id="p-percent">50%</span>
                        </div>
                    </div>
                </div>

                <div class="type-description" id="type-description"></div>

                <div class="result-actions">
                    <button id="share-btn" class="secondary-btn">分享结果</button>
                    <button id="restart-btn" class="primary-btn">重新测试</button>
                </div>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="i18n.js"></script>
    <script src="app.js"></script>
</body>
</html>
